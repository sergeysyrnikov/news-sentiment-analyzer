[alembic]
script_location = migrations

sqlalchemy.url = postgresql://template_app_db_user:template_app_db_password@template_app_postgres:5432/template_app_db_name
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(rev)s_%%(slug)s

isort.entrypoint = isort
isort.options = REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S 